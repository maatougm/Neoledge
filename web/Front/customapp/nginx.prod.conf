# NeoLeadge frontend — serves Vite build, proxies API + Socket.IO to the backend container
upstream neoleadge_backend {
  server server:3000;
}

server {
  listen 80;
  listen [::]:80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Static asset cache
  location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
    expires 7d;
    access_log off;
    try_files $uri =404;
  }

  # Expose /config.json with runtime values (baked during container start by entrypoint).
  location = /config.json {
    default_type application/json;
    try_files /config.json =404;
  }

  # Socket.IO for real-time collaboration + notifications
  location /socket.io/ {
    proxy_pass http://neoleadge_backend/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
  }

  # REST API + auth + every non-static backend route
  # /portal is a Vue SPA route; the backend API moved to /api/portal (covered by 'api').
  location ~ ^/(api|auth|admin|pm|spec|team|notifications|hook|health|uploads)(/|$) {
    proxy_pass http://neoleadge_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
    client_max_body_size 100m;
    proxy_read_timeout 120s;
  }

  # SPA fallback — let Vue Router handle all other paths
  location / {
    try_files $uri $uri/ /index.html;
  }

  # gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss text/xml image/svg+xml;
  gzip_min_length 1024;
}
