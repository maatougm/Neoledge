# ============================================================================
# NeoLeadge — Production Docker Compose
# Lives entirely inside its own Docker network `neoleadge-net`.
# Web container binds to 127.0.0.1:8002 only — public traffic arrives through
# the host-level Caddy reverse proxy (separate file Caddyfile).
# ============================================================================

services:

  # ── PostgreSQL (isolated from School Hub's postgres) ───────────────────────
  # pgvector/pgvector:pg16 is a thin layer on the official postgres:16 image
  # with the `vector` extension preinstalled. Data on /var/lib/postgresql/data
  # is binary-compatible with the previous postgres:16-alpine image — no
  # pg_dump/restore needed; the cluster restarts in-place and picks up the
  # new extension type. Memory bumped 384m→1g to fit the HNSW graph index
  # for ~100k vectors (see docs/agent-orchestra/PHASE_4_PGVECTOR_PLAN.md §1.6).
  postgres:
    image: pgvector/pgvector:pg16
    container_name: neoleadge_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-neoleadge}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-neoleadge}
    volumes:
      - neoleadge_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-neoleadge} -d ${DB_NAME:-neoleadge}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 1g
    mem_reservation: 256m
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    networks: [ neoleadge-net ]

  # ── NestJS backend ─────────────────────────────────────────────────────────
  server:
    build:
      context: ../../web/back-nest
      dockerfile: Dockerfile
    container_name: neoleadge_server
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=512"
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-neoleadge}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-neoleadge}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      CAHIER_AI_MODEL: ${CAHIER_AI_MODEL:-}
      CAHIER_GEMINI_MODEL: ${CAHIER_GEMINI_MODEL:-}
      AI_FALLBACK_API_KEY: ${AI_FALLBACK_API_KEY:-}
      AI_FALLBACK_BASE_URL: ${AI_FALLBACK_BASE_URL:-}
      AI_FALLBACK_MODEL: ${AI_FALLBACK_MODEL:-}
      AI_FALLBACK_PROVIDER: ${AI_FALLBACK_PROVIDER:-openai}
      AI_AGENT_MODE: ${AI_AGENT_MODE:-off}
      CAHIER_USE_PLANNER: ${CAHIER_USE_PLANNER:-off}
      CAHIER_PLANNER_SKIP_CRITIQUE: ${CAHIER_PLANNER_SKIP_CRITIQUE:-off}
      BACKLOG_USE_PLANNER: ${BACKLOG_USE_PLANNER:-off}
      ASSIGNMENT_USE_PLANNER: ${ASSIGNMENT_USE_PLANNER:-off}
      # Phase 4 — pgvector semantic retrieval. Default OFF until the eval
      # suite confirms recall ≥0.7 on the live dataset; flip to "on" via
      # .env.prod once backfill is verified.
      CAHIER_USE_SEMANTIC_RETRIEVAL: ${CAHIER_USE_SEMANTIC_RETRIEVAL:-off}
      EMBEDDING_TIMEOUT_MS: ${EMBEDDING_TIMEOUT_MS:-15000}
      LIVE_MEETING_COPILOT: ${LIVE_MEETING_COPILOT:-off}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Pinned to the docker-internal service name — overriding via .env.prod
      # would break the compose-network resolution.
      TRANSCRIPTION_URL: http://transcription:8000
      TRANSCRIPTION_SECRET: ${TRANSCRIPTION_SECRET}
      # AssemblyAI Universal-2 — primary STT + diarization for live meetings.
      # When unset, falls back to the local faster-whisper + SpeechBrain stack.
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY:-}
      # Audio retention sweep — purge meeting recordings older than this
      # many days. Set to 0 to disable (audio kept indefinitely).
      MEETING_AUDIO_RETENTION_DAYS: ${MEETING_AUDIO_RETENTION_DAYS:-90}
      # Per-project daily AI token budget. 0 / unset = unlimited.
      # Hits BadGateway with a quota message when exceeded.
      AI_MAX_TOKENS_PER_PROJECT_PER_DAY: ${AI_MAX_TOKENS_PER_PROJECT_PER_DAY:-0}
      CORS_ORIGINS: ${CORS_ORIGINS}
      THROTTLER_WHITELIST: ${THROTTLER_WHITELIST:-}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Public base URL used to build links in emails (e.g. the password-reset
      # link). MUST be the prod origin or reset emails point at localhost.
      FRONTEND_URL: ${FRONTEND_URL:-}
    volumes:
      - neoleadge_uploads:/app/uploads
      - neoleadge_logs:/app/logs
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped
    mem_limit: 768m
    mem_reservation: 192m
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }
    networks: [ neoleadge-net ]

  # ── Python transcription microservice ──────────────────────────────────────
  # Uses faster-whisper + speechbrain ECAPA. Bound to the internal
  # neoleadge-net only; no host port published (per its Dockerfile lockdown).
  # Models cache to /home/nonroot/.cache so they persist across restarts.
  transcription:
    build:
      context: ../../web/Transcription
      dockerfile: Dockerfile
    container_name: neoleadge_transcription
    environment:
      TRANSCRIPTION_SECRET: ${TRANSCRIPTION_SECRET}
      ALLOWED_ORIGIN: http://server:3000
      # Default to "base" (~140 MB) to fit the test box's RAM. Override to
      # "small" / "medium" / "large-v3" via .env.prod for higher quality.
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      DEVICE: ${TRANSCRIPTION_DEVICE:-cpu}
      COMPUTE_TYPE: ${TRANSCRIPTION_COMPUTE_TYPE:-int8}
      # The Dockerfile creates `nonroot` as a system user with no HOME, so
      # huggingface_hub (default cache: $HOME/.cache) lands at /nonexistent
      # and can't write. Pin caches under /app (owned by nonroot per Dockerfile).
      HOME: /app
      HF_HOME: /app/.cache/huggingface
      XDG_CACHE_HOME: /app/.cache
    volumes:
      - neoleadge_models:/app/.cache
    restart: unless-stopped
    mem_limit: 3g
    mem_reservation: 512m
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }
    networks: [ neoleadge-net ]

  # ── Frontend (Vite build served by nginx) ──────────────────────────────────
  web:
    build:
      context: ../../web/Front/customapp
      dockerfile: Dockerfile
    container_name: neoleadge_web
    ports:
      - "127.0.0.1:8002:80"   # only accessible to Caddy on the host
    depends_on: [ server ]
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 32m
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    networks: [ neoleadge-net ]

volumes:
  neoleadge_db:
  neoleadge_uploads:
  neoleadge_logs:
  neoleadge_models:

networks:
  neoleadge-net:
    driver: bridge
