name: CI

on:
  push:
    branches: [master, nest-back, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/back-nest

    # No DB service: all jest specs use mocked PrismaService.
    # The gated `pgvector.int.spec` skips unless INTEGRATION_DB_URL is set,
    # which it isn't here.
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
      JWT_SECRET: ci-secret-at-least-32-chars-long-padding-aaa
      JWT_EXPIRES_IN: 7d

    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/back-nest/package-lock.json

      - run: npm ci

      - name: Prisma client generate
        # `prisma generate` does not need DB connectivity — it just emits TS
        # types into node_modules/.prisma/client. `prisma db push` is forbidden
        # per CLAUDE.md, and `migrate deploy` would need a real DB.
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Tests (jest, 1632 specs across 92 suites)
        # No `--passWithNoTests` — fail loudly on missing/failing tests.
        run: npx jest

  frontend:
    name: Frontend (Vue 3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/Front/customapp

    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/Front/customapp/package-lock.json

      - run: npm ci

      - name: Tests (vitest, 867 specs across 123 suites)
        run: npx vitest run

      - name: Type-check + build
        run: npm run build

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

  smoke:
    name: Zero-error smoke test (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: neoleadge
          POSTGRES_PASSWORD: neoleadge
          POSTGRES_DB: neoleadge
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U neoleadge"
          --health-interval=10s --health-timeout=5s --health-retries=10

    env:
      DATABASE_URL: postgresql://neoleadge:neoleadge@127.0.0.1:5432/neoleadge?schema=public
      JWT_SECRET: ci-secret-at-least-32-chars-long-padding-aaa
      JWT_EXPIRES_IN: 8h
      # Required by app.module env validation. No transcription service runs in
      # CI; these just satisfy startup (smoke scripts don't exercise STT).
      TRANSCRIPTION_URL: http://localhost:8000
      TRANSCRIPTION_SECRET: ci-transcription-secret
      # The smoke frontend is served by vite preview on :5174; allow it (and
      # the dev origin) through CORS so in-browser API calls aren't blocked.
      CORS_ORIGINS: http://localhost:5174,http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      # Backend setup + start
      - name: Backend install + seed
        working-directory: web/back-nest
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npx tsx prisma/seed.ts || true
          npx tsx prisma/seed-openproject.ts || true

      - name: Backend start (background)
        working-directory: web/back-nest
        run: |
          nohup npm run start > /tmp/backend.log 2>&1 &
          # Wait for it to become healthy
          for i in {1..30}; do
            if curl -s http://localhost:5122/health | grep -q '"status":"ok"'; then exit 0; fi
            sleep 2
          done
          echo "Backend did not become healthy"; cat /tmp/backend.log; exit 1

      # Frontend setup + build + static serve
      - name: Frontend install + build
        working-directory: web/Front/customapp
        run: |
          npm ci
          npm run build

      - name: Frontend serve (background)
        working-directory: web/Front/customapp
        run: |
          # vite preview serves the built app at the configured base
          # (/Sample/Front/) with SPA fallback — `serve dist` can't do the
          # subpath, which is what the smoke scripts hardcode as BASE.
          npm run preview -- --port 5174 --strictPort &
          for i in {1..30}; do
            if curl -sf http://localhost:5174/Sample/Front/ > /dev/null; then exit 0; fi
            sleep 1
          done
          echo "Frontend serve did not start"; exit 1

      # Run the smoke harness
      - name: Install Playwright + browsers + axe
        working-directory: web/Front/customapp
        run: |
          npm install --no-save playwright @axe-core/playwright axe-core
          npx playwright install --with-deps chromium

      - name: Smoke — navigation + interactive flows
        working-directory: web/Front/customapp
        run: node smoke-test.mjs

      - name: Smoke — mutations (real CRUD in browser)
        working-directory: web/Front/customapp
        run: node smoke-mutations.mjs

      - name: Smoke — accessibility (axe-core, fails on critical)
        working-directory: web/Front/customapp
        run: node smoke-a11y.mjs

      - name: Smoke — dark mode
        working-directory: web/Front/customapp
        run: node smoke-darkmode.mjs

      - name: Smoke — mobile (iPhone SE viewport)
        working-directory: web/Front/customapp
        run: node smoke-mobile.mjs

      - name: Smoke — RBAC matrix (6 roles × API + UI)
        working-directory: web/Front/customapp
        run: node smoke-rbac.mjs

      - name: Smoke — public + auth transitions (lockout, portal)
        working-directory: web/Front/customapp
        run: node smoke-public.mjs

      - name: Smoke — every clickable button (bounded)
        working-directory: web/Front/customapp
        run: node smoke-every-button.mjs

      - name: Smoke — multi-user real-time collaboration
        working-directory: web/Front/customapp
        run: node smoke-collab.mjs

      - name: Upload smoke reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-reports
          path: |
            /tmp/smoke-report.json
            /tmp/smoke-mutations.json
            /tmp/smoke-a11y.json
            /tmp/smoke-darkmode.json
            /tmp/smoke-mobile.json
            /tmp/smoke-rbac.json
            /tmp/smoke-public.json
            /tmp/smoke-every-button.json
            /tmp/smoke-collab.json
